<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>나의 바로가기</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<style>
body {
    font-family: 'Malgun Gothic', Arial, sans-serif;
    background-color: #f4f6f8;
    text-align: center;
    margin-top: 100px;
}

.header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 40px;
}

h1 { margin: 0; font-size: 24px; }

button { 
    cursor: pointer; 
    padding: 4px 10px;
    font-size: 13px;
    border-radius: 5px;
    border: 1px solid #ccc;
    background-color: #fff;
    transition: 0.2s;
    line-height: 1.2;
}

button:hover {
    background-color: #f0f0f0;
}

.container {
    display: grid;
    grid-template-columns: repeat(4, 220px);
    justify-content: center;
    gap: 20px;
}

/* 📍 수정 모드일 때만 grab 커서가 나오도록 설정 */
.edit-mode .site-box { cursor: grab !important; }
.edit-mode .site-box:active { cursor: grabbing !important; }

.site-box { transition: transform 0.2s; }

a {
    display: flex; 
    align-items: center;
    justify-content: center;
    width: 180px; 
    padding: 15px;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    /* 드래그 방해 금지 */
    pointer-events: auto; 
}

/* 드래그 중인 요소의 스타일 */
.sortable-ghost {
    opacity: 0.4;
    transform: scale(0.9);
}

.favicon {
    width: 16px;
    height: 16px;
    margin-right: 8px;
    border-radius: 2px;
    pointer-events: none; /* 아이콘이 드래그를 방해하지 않도록 설정 */
}

a:hover {
    filter: brightness(90%);
}

.edit-area { 
    display:none; 
    margin-top:30px; 
    padding: 20px;
    background: #fff;
    border-top: 1px solid #ddd;
}

.palette {
    display: grid;
    grid-template-columns: repeat(12, 20px);
    gap: 3px;
    justify-content: center;
    margin: 15px 0;
}

.color-box {
    width: 20px;
    height: 20px;
    cursor: pointer;
    border: 1px solid #ccc;
}

.color-box:hover { transform: scale(1.2); }

.preview {
    width: 100px;
    height: 30px;
    margin: 10px auto;
    border-radius: 5px;
    border: 1px solid #ccc;
}

#editList div { margin-bottom: 8px; }

input {
    padding: 4px 8px;
    font-size: 13px;
    border: 1px solid #ccc;
    border-radius: 4px;
}
</style>
</head>

<body>

<div class="header">
    <h1>🚀 나의 즐겨찾기</h1>
    <button onclick="toggleEdit()">⚙ 수정</button>
</div>

<div class="container" id="container"></div>

<div class="edit-area" id="editArea">
    <div id="editList"></div>
    <hr>
    <h3>🎨 색상 선택</h3>
    <div class="palette" id="palette"></div>
    <div class="preview" id="preview"></div>
    <button onclick="saveColor()">색상 저장</button>
    <hr>
    <input id="newName" placeholder="이름">
    <input id="newUrl" placeholder="URL">
    <button onclick="addSite()">추가</button>
    <br><br>
    <button onclick="saveAll()" style="background-color: #4CAF50; color: white; border: none; padding: 8px 20px;">전체 저장</button>
</div>

<script>
let sites = JSON.parse(localStorage.getItem("sites")) || [
    {name:"구글", url:"https://www.google.com"},
    {name:"유튜브", url:"https://www.youtube.com"},
    {name:"네이버", url:"https://www.naver.com"},
    {name:"ChatGPT", url:"https://chat.openai.com"}
];

let bgColor = localStorage.getItem("bgColor") || "#4CAF50";
let selectedColor = bgColor;

function saveStorage() {
    localStorage.setItem("sites", JSON.stringify(sites));
}

function saveColor() {
    bgColor = selectedColor;
    localStorage.setItem("bgColor", bgColor);
    render();
}

let editMode = false;
let sortable = null;

function toggleEdit() {
    editMode = !editMode;
    const container = document.getElementById("container");
    const editArea = document.getElementById("editArea");

    editArea.style.display = editMode ? "block" : "none";
    
    // 📍 수정 모드일 때 컨테이너에 클래스 부여 (커서 제어용)
    if(editMode) container.classList.add("edit-mode");
    else container.classList.remove("edit-mode");

    if (editMode) {
        createPalette();
        updatePreview(bgColor);
        renderEdit();
    }
    render();
}

function createPalette() {
    const palette = document.getElementById("palette");
    palette.innerHTML = "";
    const colors = [];
    for (let h = 0; h < 360; h += 30) {
        for (let l = 70; l >= 30; l -= 20) {
            colors.push(`hsl(${h}, 80%, ${l}%)`);
        }
    }
    colors.forEach(color => {
        const div = document.createElement("div");
        div.className = "color-box";
        div.style.background = color;
        div.onclick = () => {
            selectedColor = color;
            updatePreview(color);
        };
        palette.appendChild(div);
    });
}

function updatePreview(color) {
    document.getElementById("preview").style.background = color;
}

function render() {
    const container = document.getElementById("container");
    container.innerHTML = "";

    sites.forEach(site => {
        const div = document.createElement("div");
        div.className = "site-box";
        
        const faviconUrl = `https://www.google.com/s2/favicons?domain=${site.url}&sz=32`;

        // 📍 수정 모드일 때 링크 클릭 방지 (드래그 우선)
        div.innerHTML = `
            <a href="${editMode ? '#' : site.url}" ${editMode ? 'onclick="return false;"' : 'target="_blank"'} style="background:${bgColor}">
                <img src="${faviconUrl}" class="favicon">
                ${site.name}
            </a>`;
        container.appendChild(div);
    });

    if (sortable) sortable.destroy();

    if (editMode) {
        sortable = new Sortable(container, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            onEnd: function (evt) {
                const moved = sites.splice(evt.oldIndex, 1)[0];
                sites.splice(evt.newIndex, 0, moved);
                saveStorage();
            }
        });
    }
}

function renderEdit() {
    const editList = document.getElementById("editList");
    editList.innerHTML = "";
    sites.forEach((site, i) => {
        const div = document.createElement("div");
        div.innerHTML = `
            <input value="${site.name}" id="name${i}">
            <input value="${site.url}" id="url${i}">
            <button onclick="removeSite(${i})" style="color:red; border-color:red;">삭제</button>
        `;
        editList.appendChild(div);
    });
}

function addSite() {
    const name = document.getElementById("newName").value.trim();
    let url = document.getElementById("newUrl").value.trim();
    if (!name || !url) return alert("입력하세요");
    if(!url.startsWith('http')) url = 'https://' + url;
    sites.push({name, url});
    saveStorage();
    render();
    renderEdit();
}

function removeSite(i) {
    sites.splice(i, 1);
    saveStorage();
    render();
    renderEdit();
}

function saveAll() {
    sites = sites.map((site, i) => ({
        name: document.getElementById("name"+i).value,
        url: document.getElementById("url"+i).value
    }));
    saveStorage();
    render();
    alert("저장 완료!");
}

render();
</script>

</body>
</html>
