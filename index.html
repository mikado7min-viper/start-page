<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>나의 바로가기</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        text-align: center;
        margin-top: 100px;
    }
    h1 {
        margin-bottom: 40px;
    }
    .link-box {
        display: inline-block;
        margin: 10px;
    }
    a {
        display: block;
        width: 200px;
        padding: 15px;
        background-color: #4CAF50;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-size: 18px;
        transition: 0.2s;
    }
    a:hover {
        background-color: #45a049;
        transform: scale(1.05);
    }
</style>
</head>
<body>

<h1>🚀 나의 즐겨찾기</h1>

<div class="link-box">
    <a href="https://www.google.com" target="_blank">구글</a>
</div>

<div class="link-box">
    <a href="https://www.youtube.com" target="_blank">유튜브</a>
</div>

<div class="link-box">
    <a href="https://www.naver.com" target="_blank">네이버</a>
</div>

<div class="link-box">
    <a href="https://chat.openai.com" target="_blank">ChatGPT</a>
</div>

</body>
</html>
